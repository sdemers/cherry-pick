name: 'PR Cherry Pick Action'
description: 'Cherry-pick a PR or its commits to a target branch'
author: 'sdemers'

inputs:
  pr_number:
    description: 'Pull Request number to cherry-pick from'
    required: true
  target_branch:
    description: 'Target branch(s) to cherry-pick to. Multiple branches can be space or comma separated.'
    required: true
  github_token:
    description: 'GitHub token for authentication'
    required: true
    default: ${{ github.token }}

runs:
  using: 'node24'
  main: 'dist/index.js'

branding:
  icon: 'git-pull-request'
  color: 'gray-dark' 
